services:
  sglang-glm5:
    image: rocm/sgl-dev:v0.5.8.post1-rocm720-mi30x-20260219
    container_name: sglang-glm5
    restart: always
    network_mode: host
    ipc: host
    shm_size: 64g
    cap_add:
      - SYS_PTRACE
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    volumes:
      - /data0:/data0
    environment:
      - MODEL_PATH=/data0/huggingface/GLM-5-FP8
      - PORT=8002
      - SGLANG_HEALTH_CHECK_TIMEOUT=30
      - SGLANG_REQ_RUNNING_TIMEOUT=600
      - SGLANG_REQ_WAITING_TIMEOUT=120
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 25s
      retries: 3
      start_period: 600s
    entrypoint: >
      bash -c "
        cd /sgl-workspace/aiter && pip install -e . -q &&
        pip install 'transformers>=5.3.0' -q &&
        python -m sglang.launch_server
          --model $$MODEL_PATH
          --tp 8
          --trust-remote-code
          --nsa-prefill-backend tilelang
          --nsa-decode-backend tilelang
          --chunked-prefill-size 131072
          --mem-fraction-static 0.80
          --max-total-tokens 131072
          --watchdog-timeout 300
          --soft-watchdog-timeout 120
          --served-model-name glm-5-fp8
          --tool-call-parser glm47
          --reasoning-parser glm45
          --host 0.0.0.0
          --port $$PORT
      "

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
